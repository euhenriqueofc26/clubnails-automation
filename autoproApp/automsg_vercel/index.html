<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoMsg Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e8e8f0;font-family:system-ui,sans-serif;min-height:100vh}
.inp{background:#1a1a26;border:1px solid #2a2a3e;border-radius:10px;color:#e8e8f0;font-family:inherit;font-size:14px;padding:10px 13px;outline:none;width:100%;box-sizing:border-box;transition:border-color .2s}
.inp:focus{border-color:#00e5a0}
.inp::placeholder{color:#3a3a5a}
textarea.inp{resize:vertical}
input[type=range]{-webkit-appearance:none;background:transparent;padding:0;cursor:pointer;width:100%}
input[type=range]::-webkit-slider-runnable-track{height:4px;background:#2a2a3e;border-radius:4px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:#00e5a0;border-radius:50%;margin-top:-7px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:4px}
.card{background:#12121a;border:1px solid #2a2a3e;border-radius:16px;padding:18px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#6b6b8a;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.num{width:22px;height:22px;background:#00e5a018;border:1px solid #00e5a035;color:#00e5a0;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.lbl{font-size:11px;font-weight:600;color:#6b6b8a;letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px;display:block}
.btn{border:none;border-radius:11px;padding:11px 16px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;width:100%;transition:all .2s}
.btn-green{background:#00e5a0;color:#0a0f0a}
.btn-purple{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #3a3a5e;color:#a78bfa}
.btn-ghost{background:transparent;border:1px solid #2a2a3e;color:#e8e8f0}
.btn-danger{background:transparent;border:1px solid #ff4d6d40;color:#ff4d6d}
.btn:disabled{opacity:.4;cursor:not-allowed}
.tab-btn{flex:1;padding:10px 0;border-radius:12px;cursor:pointer;font-size:12px;border:1px solid #2a2a3e;background:#12121a;color:#6b6b8a;font-family:inherit;font-weight:400;transition:all .2s}
.tab-btn.active{background:#00e5a0;color:#0a0f0a;border-color:transparent;font-weight:700}
.chip{padding:6px 12px;border-radius:100px;border:1px solid #2a2a3e;background:#1a1a26;color:#6b6b8a;font-size:12px;cursor:pointer;display:inline-block;margin:3px;transition:all .2s}
.chip.sel{border-color:#00e5a0;background:#00e5a018;color:#00e5a0}
.preview-bubble{background:#005c4b;border-radius:12px 12px 2px 12px;padding:11px 14px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word;max-width:85%;margin-left:auto}
.log{background:#050508;border:1px solid #2a2a3e;border-radius:10px;padding:12px;font-family:monospace;font-size:12px;height:140px;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
.hidden{display:none}
.field{margin-bottom:14px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── DB (localStorage) ──────────────────────
const DB = {
  get: k => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null; } catch(e){return null;} },
  set: (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch(e){} }
};

// ── State ──────────────────────────────────
let state = {
  user: DB.get('automsg_session'),
  tab: 0,
  globalLeads: [],
  // login
  loginMode: 'login', loginName:'', loginEmail:'', loginPass:'', loginError:'', loginLoading:false,
  // coletor
  raw:'', extracting:false, extracted:[], editIdx:null, editNome:'', editTel:'',
  // disparador
  bizName:'', bizSeg:'', bizDesc:'', selT:'', custT:'', msg:'', generating:false,
  qty:30, pause:60, csvLeads:[], csvInfo:'',
  running:false, sent:0, logs:[], stopFlag:false,
};

const TARGETS=[
  {e:'💅',l:'Unhas',v:'Studios de unhas'},{e:'✨',l:'Estética',v:'Studios de estética'},
  {e:'💇',l:'Salões',v:'Salões de beleza'},{e:'🪷',l:'Depilação',v:'Clínicas de depilação'},
  {e:'✂️',l:'Barbearias',v:'Barbearias'},{e:'🎨',l:'Tatuagem',v:'Tatuadores'},
  {e:'🏋️',l:'Personal',v:'Personal trainers'},{e:'🥗',l:'Nutrição',v:'Nutricionistas'},
  {e:'🧠',l:'Psicologia',v:'Psicólogos'},{e:'🦷',l:'Dentistas',v:'Dentistas'},
  {e:'🏠',l:'Arquitetura',v:'Arquitetos'},{e:'⚖️',l:'Advocacia',v:'Advogados'},
];

// ── Render ────────────────────────────────
function render() {
  document.getElementById('app').innerHTML = state.user ? renderApp() : renderLogin();
  bindEvents();
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── LOGIN ─────────────────────────────────
function renderLogin(){
  return `
  <div style="min-height:100vh;background:#0a0a0f;display:flex;align-items:center;justify-content:center;padding:20px">
    <div style="width:100%;max-width:400px">
      <div style="text-align:center;margin-bottom:28px">
        <div style="font-size:40px;font-weight:900;letter-spacing:-0.03em;color:#e8e8f0;line-height:1">Auto<span style="color:#00e5a0">Msg</span> <span style="font-size:16px;color:#6b6b8a;font-weight:400">Pro</span></div>
        <div style="color:#6b6b8a;font-size:13px;margin-top:8px">Plataforma de prospecção inteligente</div>
      </div>
      <div class="card" style="padding:28px">
        <div style="display:flex;gap:6px;margin-bottom:22px;background:#1a1a26;padding:4px;border-radius:10px">
          <button onclick="s('loginMode','login');s('loginError','');render()" style="flex:1;padding:8px 0;background:${state.loginMode==='login'?'#12121a':'transparent'};border:${state.loginMode==='login'?'1px solid #2a2a3e':'none'};border-radius:8px;color:${state.loginMode==='login'?'#e8e8f0':'#6b6b8a'};font-size:13px;font-weight:${state.loginMode==='login'?600:400};cursor:pointer;font-family:inherit">Entrar</button>
          <button onclick="s('loginMode','register');s('loginError','');render()" style="flex:1;padding:8px 0;background:${state.loginMode==='register'?'#12121a':'transparent'};border:${state.loginMode==='register'?'1px solid #2a2a3e':'none'};border-radius:8px;color:${state.loginMode==='register'?'#e8e8f0':'#6b6b8a'};font-size:13px;font-weight:${state.loginMode==='register'?600:400};cursor:pointer;font-family:inherit">Criar conta</button>
        </div>
        ${state.loginMode==='register'?`<div class="field"><span class="lbl">Nome completo</span><input class="inp" id="inp-name" placeholder="Seu nome" value="${esc(state.loginName)}"></div>`:''}
        <div class="field"><span class="lbl">Email</span><input class="inp" id="inp-email" type="email" placeholder="seu@email.com" value="${esc(state.loginEmail)}"></div>
        <div class="field"><span class="lbl">Senha</span><input class="inp" id="inp-pass" type="password" placeholder="••••••••" value="${esc(state.loginPass)}"></div>
        ${state.loginError?`<div style="background:#ff4d6d15;border:1px solid #ff4d6d40;border-radius:8px;padding:8px 12px;font-size:13px;color:#ff4d6d;margin-bottom:14px">${esc(state.loginError)}</div>`:''}
        <button class="btn btn-green" onclick="doLogin()" ${state.loginLoading?'disabled':''}>${state.loginLoading?'⏳ Aguarde...':state.loginMode==='login'?'→ Entrar':'→ Criar conta'}</button>
      </div>
    </div>
  </div>`;
}

function doLogin(){
  const email = document.getElementById('inp-email')?.value.trim();
  const pass = document.getElementById('inp-pass')?.value.trim();
  const name = document.getElementById('inp-name')?.value.trim();
  if(!email||!pass){s('loginError','Preencha email e senha.');render();return;}
  if(state.loginMode==='register'&&!name){s('loginError','Preencha seu nome.');render();return;}
  const users = DB.get('automsg_users')||{};
  if(state.loginMode==='register'){
    if(users[email]){s('loginError','Email já cadastrado.');render();return;}
    users[email]={name,email,pass,createdAt:new Date().toISOString()};
    DB.set('automsg_users',users);
    const u={name,email}; DB.set('automsg_session',u); state.user=u; render();
  } else {
    const u=users[email];
    if(!u||u.pass!==pass){s('loginError','Email ou senha incorretos.');render();return;}
    const usr={name:u.name,email}; DB.set('automsg_session',usr); state.user=usr; render();
  }
}

// ── APP ───────────────────────────────────
function renderApp(){
  const TABS=['📋 Coletor','📤 Disparador','📊 Histórico'];
  return `
  <div style="background:#0a0a0f;min-height:100vh">
    <div style="max-width:720px;margin:0 auto;padding:20px 14px 0">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div>
          <div style="font-size:28px;font-weight:900;letter-spacing:-0.03em">Auto<span style="color:#00e5a0">Msg</span> <span style="font-size:13px;color:#6b6b8a;font-weight:400">Pro</span></div>
          <div style="font-size:12px;color:#6b6b8a;margin-top:2px">Olá, <strong style="color:#e8e8f0">${esc(state.user.name)}</strong> 👋</div>
        </div>
        <button onclick="doLogout()" style="background:none;border:1px solid #2a2a3e;color:#6b6b8a;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;font-family:inherit">Sair</button>
      </div>
      <div style="display:flex;gap:6px;margin-bottom:16px">
        ${TABS.map((t,i)=>`<button class="tab-btn ${state.tab===i?'active':''}" onclick="s('tab',${i});render()">${t}${i===0&&state.globalLeads.length>0?`<span style="margin-left:4px;background:${state.tab===0?'#0a0f0a':'#00e5a0'};color:${state.tab===0?'#00e5a0':'#0a0f0a'};border-radius:100px;font-size:10px;font-weight:800;padding:1px 6px">${state.globalLeads.length}</span>`:''}</button>`).join('')}
      </div>
    </div>
    <div style="max-width:720px;margin:0 auto;padding:0 14px 60px">
      ${state.tab===0?renderColetor():state.tab===1?renderDisparador():renderHistorico()}
    </div>
  </div>`;
}

function doLogout(){ DB.set('automsg_session',null); state.user=null; state.tab=0; state.globalLeads=[]; render(); }

// ── COLETOR ───────────────────────────────
function renderColetor(){
  return `
  <div class="card">
    <div class="card-title"><span class="num">1</span> Colar Dados do Google Maps</div>
    <span class="lbl">Texto copiado do Google Maps</span>
    <textarea class="inp" id="raw-text" rows="7" placeholder="Cole aqui os dados do Maps. Ex:&#10;&#10;Studio Bella Arte&#10;(11) 99999-1234&#10;&#10;Nails &amp; Cia&#10;(21) 98888-5678" style="margin-bottom:12px;font-family:monospace;font-size:12px">${esc(state.raw)}</textarea>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" style="flex:1" onclick="window.open('https://www.google.com/maps/search/','_blank')">🗺 Abrir Maps</button>
      <button class="btn btn-purple" style="flex:2" onclick="doExtrair()" ${state.extracting?'disabled':''}>${state.extracting?'⏳ Extraindo...':'✨ Extrair com IA'}</button>
    </div>
  </div>
  ${state.extracted.length>0?renderExtracted():''}
  ${state.globalLeads.length>0?`
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:13px;color:#6b6b8a">📋 <strong style="color:#00e5a0">${state.globalLeads.length} leads</strong> na lista</span>
      <div style="display:flex;gap:8px">
        <button onclick="dlCSV(state.globalLeads,'leads')" style="background:#1a1a26;border:1px solid #2a2a3e;color:#e8e8f0;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:12px;font-family:inherit">⬇ CSV</button>
        <button onclick="if(confirm('Limpar?')){state.globalLeads=[];render()}" style="background:none;border:1px solid #ff4d6d40;color:#ff4d6d;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:12px;font-family:inherit">🗑</button>
      </div>
    </div>
  </div>`:''}`;
}

function renderExtracted(){
  return `
  <div class="card">
    <div class="card-title"><span class="num">2</span> ${state.extracted.length} Leads Encontrados</div>
    <div style="display:flex;flex-direction:column;gap:7px;max-height:260px;overflow-y:auto;margin-bottom:12px">
      ${state.extracted.map((lead,idx)=>`
      <div style="background:#1a1a26;border:1px solid #2a2a3e;border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:8px">
        ${state.editIdx===idx?`
          <input class="inp" id="edit-nome" value="${esc(state.editNome)}" style="flex:2;padding:5px 9px;font-size:13px;border-color:#00e5a0">
          <input class="inp" id="edit-tel" value="${esc(state.editTel)}" style="flex:1;padding:5px 9px;font-size:13px;border-color:#00e5a0;margin-left:6px">
          <button onclick="saveEdit(${idx})" style="background:#00e5a018;border:1px solid #00e5a0;color:#00e5a0;border-radius:7px;padding:4px 10px;cursor:pointer;font-size:12px;font-family:inherit;margin-left:6px">✓</button>
        `:`
          <div style="flex:1">
            <div style="font-size:13px;font-weight:500">${esc(lead.nome)}</div>
            <div style="font-size:11px;color:${lead.telefone==='sem telefone'?'#ff4d6d':'#6b6b8a'};margin-top:2px">${esc(lead.telefone)}</div>
          </div>
          <button onclick="startEdit(${idx})" style="background:none;border:1px solid #2a2a3e;color:#6b6b8a;border-radius:7px;padding:3px 8px;cursor:pointer;font-size:11px;font-family:inherit">✏️</button>
          <button onclick="removeExtracted(${idx})" style="background:none;border:1px solid #ff4d6d40;color:#ff4d6d;border-radius:7px;padding:3px 8px;cursor:pointer;font-size:11px;font-family:inherit">✕</button>
        `}
      </div>`).join('')}
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" style="flex:1" onclick="dlCSV(state.extracted,'leads')">⬇ Baixar CSV</button>
      <button class="btn btn-green" style="flex:2" onclick="enviarParaDisparador()">✅ Usar no Disparador →</button>
    </div>
  </div>`;
}

async function doExtrair(){
  const raw = document.getElementById('raw-text')?.value.trim();
  if(!raw){alert('Cole o texto do Google Maps primeiro.');return;}
  state.raw=raw; state.extracting=true; render();
  const prompt=`Analise o texto e extraia todos os negócios. Retorne SOMENTE JSON: [{"nome":"Nome","telefone":"DDD+número"}]. Se não tiver telefone use "sem telefone". Remova formatação dos números. APENAS JSON sem markdown.\nTexto:\n${raw}`;
  try{
    let t=await callAI(prompt);
    t=t.replace(/```json|```/g,'').trim();
    state.extracted=JSON.parse(t);
  }catch(e){alert('Erro ao extrair: '+e.message);}
  state.extracting=false; render();
}

function startEdit(idx){ state.editIdx=idx; state.editNome=state.extracted[idx].nome; state.editTel=state.extracted[idx].telefone; render(); }
function saveEdit(idx){
  const nome=document.getElementById('edit-nome')?.value;
  const tel=document.getElementById('edit-tel')?.value;
  state.extracted[idx]={nome,telefone:tel}; state.editIdx=null; render();
}
function removeExtracted(idx){ state.extracted.splice(idx,1); render(); }
function enviarParaDisparador(){
  const validos=state.extracted.filter(e=>e.telefone!=='sem telefone');
  const ex=new Set(state.globalLeads.map(l=>l.telefone));
  state.globalLeads=[...state.globalLeads,...validos.filter(n=>!ex.has(n.telefone))];
  alert(`✅ ${validos.length} leads enviados ao Disparador!`);
  state.extracted=[];state.raw='';state.tab=1;render();
}

// ── DISPARADOR ────────────────────────────
function renderDisparador(){
  const all=[...state.globalLeads,...state.csvLeads];
  return `
  <div class="card">
    <div class="card-title"><span class="num">1</span> Seu Negócio</div>
    <div class="row2" style="margin-bottom:12px">
      <div><span class="lbl">Nome</span><input class="inp" id="biz-name" placeholder="Ex: Club Nails Brasil" value="${esc(state.bizName)}"></div>
      <div><span class="lbl">Segmento</span><input class="inp" id="biz-seg" placeholder="Ex: Beleza..." value="${esc(state.bizSeg)}"></div>
    </div>
    <span class="lbl">Descrição</span>
    <textarea class="inp" id="biz-desc" rows="2" placeholder="O que você oferece...">${esc(state.bizDesc)}</textarea>
  </div>

  <div class="card">
    <div class="card-title"><span class="num">2</span> Público Alvo</div>
    <div style="margin-bottom:10px">${TARGETS.map(t=>`<span class="chip ${state.selT===t.v?'sel':''}" onclick="s('selT','${t.v}');s('custT','');render()">${t.e} ${t.l}</span>`).join('')}</div>
    <input class="inp" id="cust-target" placeholder="Ou descreva seu público..." value="${esc(state.custT)}">
  </div>

  <div class="card">
    <div class="card-title"><span class="num">3</span> Mensagem</div>
    <button class="btn btn-purple" onclick="doGerarMensagem()" ${state.generating?'disabled':''} style="margin-bottom:12px">${state.generating?'⏳ Gerando...':'✨ Gerar mensagem com IA'}</button>
    <span class="lbl">Mensagem</span>
    <textarea class="inp" id="msg-text" rows="6" placeholder="Escreva ou gere acima..." style="margin-bottom:12px">${esc(state.msg)}</textarea>
    <div style="background:#0d1117;border:1px solid #1e2a3a;border-radius:12px;padding:14px">
      <div class="preview-bubble">${esc(state.msg)||'Preview da mensagem...'}</div>
      <div style="font-size:10px;color:#8696a0;text-align:right;margin-top:4px">agora ✓✓</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span class="num">4</span> Configurações</div>
    <span class="lbl">Mensagens por dia: <span style="color:#00e5a0;font-size:16px;font-weight:800">${state.qty}</span></span>
    <input type="range" id="qty-range" min="5" max="50" value="${state.qty}" oninput="s('qty',+this.value);document.getElementById('qty-disp').textContent=this.value" style="margin-bottom:16px">
    <span class="lbl">Pausa entre mensagens: <span style="color:#00e5a0;font-size:16px;font-weight:800" id="pause-disp">${state.pause}s</span></span>
    <input type="range" id="pause-range" min="30" max="180" value="${state.pause}" oninput="s('pause',+this.value);document.getElementById('pause-disp').textContent=this.value+'s'" style="margin-bottom:16px">
    <div style="background:#1a1a26;border:1px solid #2a2a3e;border-radius:12px;padding:14px">
      <div style="font-size:13px;margin-bottom:8px">📋 Coletor: <strong style="color:#00e5a0">${state.globalLeads.length}</strong> &nbsp;|&nbsp; 📁 CSV: <strong style="color:#00e5a0">${state.csvLeads?.length||0}</strong> &nbsp;|&nbsp; Total: <strong style="color:#00e5a0">${all.length}</strong></div>
      <span class="lbl">Carregar CSV</span>
      <input type="file" accept=".csv" onchange="loadCSV(this)" style="font-size:12px;color:#6b6b8a;width:100%">
      ${state.csvInfo?`<div style="font-size:11px;color:#6b6b8a;margin-top:5px">${esc(state.csvInfo)}</div>`:''}
    </div>
  </div>

  <button class="btn btn-green" onclick="doIniciar()" ${state.running?'disabled':''} style="padding:18px;font-size:16px;font-weight:900;letter-spacing:0.05em;margin-top:4px">▶ &nbsp; Iniciar Campanha</button>

  ${(state.running||state.logs.length>0)?`
  <div style="margin-top:16px">
    <div style="display:flex;justify-content:space-between;margin-bottom:8px">
      <span style="font-size:13px;color:#6b6b8a">Enviadas</span>
      <span style="font-size:20px;font-weight:800;color:#00e5a0">${state.sent} / ${state.qty}</span>
    </div>
    <div style="height:8px;background:#2a2a3e;border-radius:8px;overflow:hidden;margin-bottom:12px">
      <div style="height:100%;background:#00e5a0;border-radius:8px;width:${(state.sent/state.qty)*100}%;transition:width 0.5s"></div>
    </div>
    <div class="log" id="log-box">
      ${state.logs.map(l=>`<div style="display:flex;gap:8px"><span style="color:#6b6b8a;flex-shrink:0">${l.t}</span><span style="color:${{ok:'#00e5a0',err:'#ff4d6d',info:'#ffb347'}[l.type]||'#ffb347'}">${esc(l.text)}</span></div>`).join('')}
    </div>
    ${state.running?`<button class="btn btn-danger" onclick="state.stopFlag=true" style="margin-top:10px">⏹ Parar</button>`:''}
  </div>`:''}`;
}

async function doGerarMensagem(){
  const bizName=document.getElementById('biz-name')?.value.trim();
  const bizSeg=document.getElementById('biz-seg')?.value.trim();
  const bizDesc=document.getElementById('biz-desc')?.value.trim();
  const custT=document.getElementById('cust-target')?.value.trim();
  if(!bizName){alert('Preencha o nome do negócio.');return;}
  state.bizName=bizName;state.bizSeg=bizSeg;state.bizDesc=bizDesc;state.custT=custT;
  state.generating=true;render();
  const target=state.selT||custT||'profissionais em geral';
  const prompt=`Crie uma mensagem de prospecção para WhatsApp com no máximo 200 palavras.\nNegócio: ${bizName} | Segmento: ${bizSeg||'não informado'} | Descrição: ${bizDesc||'não informado'} | Público: ${target}\nRequisitos: saudação amigável, apresentação breve, benefício principal, CTA claro, emojis moderados, português brasileiro natural.\nRetorne APENAS a mensagem, sem explicações.`;
  try{state.msg=await callAI(prompt);}catch(e){alert('Erro: '+e.message);}
  state.generating=false;render();
}

function loadCSV(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    const lines=ev.target.result.trim().split('\n');
    const header=lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
    const rows=lines.slice(1).map(line=>{const vals=line.split(',').map(v=>v.trim().replace(/"/g,''));const obj={};header.forEach((h,i)=>obj[h]=vals[i]||'');return obj;}).filter(r=>Object.values(r).some(v=>v));
    state.csvLeads=rows;state.csvInfo=`✅ ${rows.length} leads carregados.`;render();
  };
  reader.readAsText(file,'UTF-8');
}

async function doIniciar(){
  const msgEl=document.getElementById('msg-text');
  if(msgEl)state.msg=msgEl.value.trim();
  const all=[...state.globalLeads,...(state.csvLeads||[])];
  if(!state.msg){alert('Escreva ou gere uma mensagem.');return;}
  if(!all.length){alert('Adicione leads pelo Coletor ou carregue um CSV.');return;}
  state.running=true;state.stopFlag=false;state.sent=0;state.logs=[];render();
  addLog(`Campanha iniciada! ${all.length} leads disponíveis.`);
  const pk=phoneKey(all[0]);let s=0;
  for(let i=0;i<all.length&&s<state.qty&&!state.stopFlag;i++){
    const phone=fmtPhone(all[i][pk]||all[i].telefone||'');
    if(phone.length<12){addLog(`Número inválido: ${phone} — pulando.`,'err');continue;}
    addLog(`Enviando para ${phone}...`);
    window.open(`https://web.whatsapp.com/send?phone=${phone}&text=${encodeURIComponent(state.msg)}`,'_blank');
    s++;state.sent=s;
    addLog(`✅ WhatsApp aberto (${s}/${state.qty})`,'ok');
    updateProgress();
    if(s<state.qty&&i<all.length-1&&!state.stopFlag){addLog(`⏳ Aguardando ${state.pause}s...`);await sleep(state.pause*1000);}
  }
  addLog(state.stopFlag?'🛑 Parado.':'🏁 Concluído! '+s+' mensagens.', state.stopFlag?'err':'ok');
  saveCampaign(s);state.running=false;render();
}

function updateProgress(){
  const el=document.getElementById('log-box');
  if(el){
    el.innerHTML=state.logs.map(l=>`<div style="display:flex;gap:8px"><span style="color:#6b6b8a;flex-shrink:0">${l.t}</span><span style="color:${{ok:'#00e5a0',err:'#ff4d6d',info:'#ffb347'}[l.type]||'#ffb347'}">${esc(l.text)}</span></div>`).join('');
    el.scrollTop=el.scrollHeight;
  }
}

function addLog(text,type='info'){const t=new Date().toLocaleTimeString('pt-BR');state.logs.push({text,type,t});updateProgress();}

function saveCampaign(sentCount){
  try{
    const bizName=state.bizName||'Campanha';
    const camps=DB.get(`automsg_camps_${state.user.email}`)||[];
    camps.push({date:new Date().toISOString(),bizName,message:state.msg,target:state.selT||state.custT||'Geral',sent:sentCount,totalLeads:[...state.globalLeads,...(state.csvLeads||[])].length,pause:state.pause,qty:state.qty});
    DB.set(`automsg_camps_${state.user.email}`,camps);
  }catch(e){}
}

// ── HISTÓRICO ─────────────────────────────
function renderHistorico(){
  const camps=DB.get(`automsg_camps_${state.user.email}`)||[];
  if(!camps.length)return`<div class="card"><div style="text-align:center;padding:24px;color:#6b6b8a"><div style="font-size:36px;margin-bottom:12px">📭</div><div style="font-size:14px">Nenhuma campanha ainda.</div></div></div>`;
  return`<div>
    <div style="font-size:13px;color:#6b6b8a;margin-bottom:12px">${camps.length} campanha(s)</div>
    ${camps.slice().reverse().map(c=>`
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div><div style="font-size:14px;font-weight:600">${esc(c.bizName||'Campanha')}</div><div style="font-size:11px;color:#6b6b8a;margin-top:2px">${new Date(c.date).toLocaleString('pt-BR')}</div></div>
        <span style="background:#00e5a018;border:1px solid #00e5a035;color:#00e5a0;border-radius:100px;font-size:11px;font-weight:700;padding:3px 10px">${c.sent} enviadas</span>
      </div>
      <div style="background:#1a1a26;border-radius:10px;padding:12px;font-size:12px;color:#6b6b8a;line-height:1.6;white-space:pre-wrap;word-break:break-word;max-height:70px;overflow:hidden;margin-bottom:10px">${esc(c.message)}</div>
      <div style="display:flex;gap:16px;font-size:12px;color:#6b6b8a"><span>🎯 ${esc(c.target)}</span><span>⏱ ${c.pause}s</span><span>📋 ${c.totalLeads} leads</span></div>
    </div>`).join('')}
  </div>`;
}

// ── Helpers ───────────────────────────────
function s(k,v){state[k]=v;}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
function fmtPhone(r){let n=String(r).replace(/\D/g,'');if(!n.startsWith('55'))n='55'+n;return n;}
function phoneKey(lead){const k=Object.keys(lead);return k.find(x=>['telefone','phone','celular','whatsapp','numero','tel'].some(p=>x.toLowerCase().includes(p)))||k[0];}
function dlCSV(leads,name){
  if(!leads.length)return;
  const h=Object.keys(leads[0]).join(',');
  const r=leads.map(l=>Object.values(l).map(v=>`"${v}"`).join(','));
  const b=new Blob([[h,...r].join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name+'.csv';a.click();
}

async function callAI(prompt){
  const r=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:prompt}]})});
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||`Erro ${r.status}`);}
  const d=await r.json();return d.content[0].text.trim();
}

function bindEvents(){
  const msgEl=document.getElementById('msg-text');
  if(msgEl)msgEl.addEventListener('input',e=>{state.msg=e.target.value;const pb=document.querySelector('.preview-bubble');if(pb)pb.textContent=e.target.value||'Preview da mensagem...';});
  const custEl=document.getElementById('cust-target');
  if(custEl)custEl.addEventListener('input',e=>{state.custT=e.target.value;if(e.target.value)state.selT='';});
}

// ── Init ──────────────────────────────────
render();
</script>
