<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoMsg Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e8e8f0;font-family:system-ui,sans-serif;min-height:100vh}
input,textarea{background:#1a1a26;border:1px solid #2a2a3e;border-radius:10px;color:#e8e8f0;font-family:inherit;font-size:14px;padding:10px 13px;outline:none;width:100%;box-sizing:border-box;transition:border-color .2s}
input:focus,textarea:focus{border-color:#00e5a0}
input::placeholder,textarea::placeholder{color:#3a3a5a}
textarea{resize:vertical}
input[type=range]{-webkit-appearance:none;background:transparent;padding:0;cursor:pointer;width:100%}
input[type=range]::-webkit-slider-runnable-track{height:4px;background:#2a2a3e;border-radius:4px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:#00e5a0;border-radius:50%;margin-top:-7px}
input[type=file]{font-size:12px;color:#6b6b8a}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:4px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;
const G = {bg:"#0a0a0f",s1:"#12121a",s2:"#1a1a26",bd:"#2a2a3e",green:"#00e5a0",gdim:"#00e5a018",gglow:"#00e5a035",text:"#e8e8f0",muted:"#6b6b8a",danger:"#ff4d6d",warn:"#ffb347",purple:"#a78bfa"};
const TARGETS=[{e:"💅",l:"Unhas",v:"Studios de unhas"},{e:"✨",l:"Estética",v:"Studios de estética"},{e:"💇",l:"Salões",v:"Salões de beleza"},{e:"🪷",l:"Depilação",v:"Clínicas de depilação"},{e:"✂️",l:"Barbearias",v:"Barbearias"},{e:"🎨",l:"Tatuagem",v:"Tatuadores"},{e:"🏋️",l:"Personal",v:"Personal trainers"},{e:"🥗",l:"Nutrição",v:"Nutricionistas"},{e:"🧠",l:"Psicologia",v:"Psicólogos"},{e:"🦷",l:"Dentistas",v:"Dentistas"},{e:"🏠",l:"Arquitetura",v:"Arquitetos"},{e:"⚖️",l:"Advocacia",v:"Advogados"}];
const DB={get:(k)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}};
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const inp=(x={})=>({background:G.s2,border:`1px solid ${G.bd}`,borderRadius:10,color:G.text,fontSize:14,padding:"10px 13px",width:"100%",outline:"none",fontFamily:"inherit",boxSizing:"border-box",...x});

async function callClaude(prompt){
  const r=await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:[{role:"user",content:prompt}]})});
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||`Erro ${r.status}`);}
  const d=await r.json();return d.content[0].text.trim();
},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||`Erro ${r.status}`);}
  const d=await r.json();return d.content[0].text.trim();
}

function fmtPhone(r){let n=String(r).replace(/\D/g,"");if(!n.startsWith("55"))n="55"+n;return n;}
function phoneKey(lead){const k=Object.keys(lead);return k.find(x=>["telefone","phone","celular","whatsapp","numero","tel"].some(p=>x.toLowerCase().includes(p)))||k[0];}
function dlCSV(leads,name="leads"){if(!leads.length)return;const h=Object.keys(leads[0]).join(",");const r=leads.map(l=>Object.values(l).map(v=>`"${v}"`).join(","));const b=new Blob([[h,...r].join("\n")],{type:"text/csv;charset=utf-8;"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`${name}.csv`;a.click();}

function Card({n,title,children,style={}}){return(<div style={{background:G.s1,border:`1px solid ${G.bd}`,borderRadius:16,padding:18,marginBottom:12,...style}}>{title&&<div style={{fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:G.muted,marginBottom:14,display:"flex",alignItems:"center",gap:8}}>{n&&<span style={{width:22,height:22,background:G.gdim,border:`1px solid ${G.gglow}`,color:G.green,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11}}>{n}</span>}{title}</div>}{children}</div>);}
function Lbl({children}){return <div style={{fontSize:11,fontWeight:600,color:G.muted,letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:6}}>{children}</div>;}
function Btn({onClick,disabled,v="green",children,style={}}){const s={green:{background:G.green,color:"#0a0f0a",border:"none"},purple:{background:"linear-gradient(135deg,#1a1a2e,#16213e)",color:disabled?G.muted:G.purple,border:"1px solid #3a3a5e"},ghost:{background:"transparent",color:G.text,border:`1px solid ${G.bd}`},danger:{background:"transparent",color:G.danger,border:`1px solid #ff4d6d40`}}[v];return <button onClick={onClick} disabled={disabled} style={{...s,borderRadius:11,padding:"11px 16px",cursor:disabled?"not-allowed":"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600,width:"100%",opacity:disabled?0.45:1,transition:"all 0.2s",...style}}>{children}</button>;}

function LoginScreen({onLogin}){
  const[mode,setMode]=useState("login");
  const[name,setName]=useState("");
  const[email,setEmail]=useState("");
  const[pass,setPass]=useState("");
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  const submit=()=>{
    setError("");
    if(!email||!pass){setError("Preencha email e senha.");return;}
    if(mode==="register"&&!name){setError("Preencha seu nome.");return;}
    setLoading(true);
    try{
      const users=DB.get("automsg_users")||{};
      if(mode==="register"){
        if(users[email]){setError("Email já cadastrado.");setLoading(false);return;}
        users[email]={name,email,pass,createdAt:new Date().toISOString()};
        DB.set("automsg_users",users);
        onLogin({name,email});
      } else {
        const u=users[email];
        if(!u||u.pass!==pass){setError("Email ou senha incorretos.");setLoading(false);return;}
        onLogin({name:u.name,email});
      }
    }catch(e){setError("Erro: "+e.message);}
    setLoading(false);
  };
  return(
    <div style={{minHeight:"100vh",background:G.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:400}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:40,fontWeight:900,letterSpacing:"-0.03em",color:G.text,lineHeight:1}}>Auto<span style={{color:G.green}}>Msg</span> <span style={{fontSize:16,color:G.muted,fontWeight:400}}>Pro</span></div>
          <div style={{color:G.muted,fontSize:13,marginTop:8}}>Plataforma de prospecção inteligente</div>
        </div>
        <div style={{background:G.s1,border:`1px solid ${G.bd}`,borderRadius:20,padding:28}}>
          <div style={{display:"flex",gap:6,marginBottom:22,background:G.s2,padding:4,borderRadius:10}}>
            {["login","register"].map((m,i)=>(
              <button key={m} onClick={()=>{setMode(m);setError("");}} style={{flex:1,padding:"8px 0",background:mode===m?G.s1:"transparent",border:mode===m?`1px solid ${G.bd}`:"none",borderRadius:8,color:mode===m?G.text:G.muted,fontSize:13,fontWeight:mode===m?600:400,cursor:"pointer",fontFamily:"inherit"}}>{i===0?"Entrar":"Criar conta"}</button>
            ))}
          </div>
          {mode==="register"&&<div style={{marginBottom:14}}><Lbl>Nome completo</Lbl><input placeholder="Seu nome" value={name} onChange={e=>setName(e.target.value)} style={inp()}/></div>}
          <div style={{marginBottom:14}}><Lbl>Email</Lbl><input type="email" placeholder="seu@email.com" value={email} onChange={e=>setEmail(e.target.value)} style={inp()}/></div>
          <div style={{marginBottom:20}}><Lbl>Senha</Lbl><input type="password" placeholder="••••••••" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} style={inp()}/></div>
          {error&&<div style={{background:"#ff4d6d15",border:"1px solid #ff4d6d40",borderRadius:8,padding:"8px 12px",fontSize:13,color:G.danger,marginBottom:14}}>{error}</div>}
          <Btn onClick={submit} disabled={loading}>{loading?"⏳ Aguarde...":mode==="login"?"→ Entrar":"→ Criar conta"}</Btn>
        </div>
      </div>
    </div>
  );
}

function Historico({user}){
  const[camps,setCamps]=useState([]);
  useEffect(()=>{const c=DB.get(`automsg_camps_${user.email}`)||[];setCamps(c);},[]);
  if(!camps.length)return(<Card><div style={{textAlign:"center",padding:24,color:G.muted}}><div style={{fontSize:36,marginBottom:12}}>📭</div><div style={{fontSize:14}}>Nenhuma campanha ainda.</div></div></Card>);
  return(
    <div>
      <div style={{fontSize:13,color:G.muted,marginBottom:12}}>{camps.length} campanha(s) registrada(s)</div>
      {camps.slice().reverse().map((c,i)=>(
        <Card key={i}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
            <div><div style={{fontSize:14,fontWeight:600}}>{c.bizName||"Campanha"}</div><div style={{fontSize:11,color:G.muted,marginTop:2}}>{new Date(c.date).toLocaleString("pt-BR")}</div></div>
            <span style={{background:G.gdim,border:`1px solid ${G.gglow}`,color:G.green,borderRadius:100,fontSize:11,fontWeight:700,padding:"3px 10px"}}>{c.sent} enviadas</span>
          </div>
          <div style={{background:G.s2,borderRadius:10,padding:12,fontSize:12,color:G.muted,lineHeight:1.6,whiteSpace:"pre-wrap",wordBreak:"break-word",maxHeight:70,overflow:"hidden",marginBottom:10}}>{c.message}</div>
          <div style={{display:"flex",gap:16,fontSize:12,color:G.muted}}><span>🎯 {c.target}</span><span>⏱ {c.pause}s</span><span>📋 {c.totalLeads} leads</span></div>
        </Card>
      ))}
    </div>
  );
}

function Coletor({globalLeads,setGlobalLeads,setTab}){
  const[raw,setRaw]=useState("");
  const[loading,setLoading]=useState(false);
  const[list,setList]=useState([]);
  const[editIdx,setEditIdx]=useState(null);
  const[editRow,setEditRow]=useState({});
  const extrair=async()=>{
    if(!raw.trim()){alert("Cole o texto do Google Maps primeiro.");return;}
    setLoading(true);
    const p=`Analise o texto e extraia todos os negócios. Retorne SOMENTE JSON: [{"nome":"Nome","telefone":"DDD+número"}]. Se não tiver telefone use "sem telefone". Remova formatação dos números. APENAS JSON sem markdown.\nTexto:\n${raw}`;
    try{let t=await callClaude(p);t=t.replace(/\`\`\`json|\`\`\`/g,"").trim();setList(JSON.parse(t));}
    catch(e){alert("Erro ao extrair: "+e.message);}
    setLoading(false);
  };
  const enviar=()=>{
    const v=list.filter(e=>e.telefone!=="sem telefone");
    setGlobalLeads(prev=>{const ex=new Set(prev.map(l=>l.telefone));return[...prev,...v.filter(n=>!ex.has(n.telefone))];});
    alert(`✅ ${v.length} leads enviados ao Disparador!`);setList([]);setRaw("");setTab(1);
  };
  return(
    <div>
      <Card n="1" title="Colar Dados do Google Maps">
        <Lbl>Texto copiado do Google Maps</Lbl>
        <textarea rows={7} value={raw} onChange={e=>setRaw(e.target.value)} placeholder={"Cole aqui os dados do Maps. Ex:\n\nStudio Bella Arte\n(11) 99999-1234\nRua das Flores, 123"} style={{...inp(),fontFamily:"monospace",fontSize:12,marginBottom:12}}/>
        <div style={{display:"flex",gap:8}}>
          <Btn v="ghost" onClick={()=>window.open("https://www.google.com/maps/search/","_blank")} style={{flex:1}}>🗺 Abrir Maps</Btn>
          <Btn v="purple" onClick={extrair} disabled={loading} style={{flex:2}}>{loading?"⏳ Extraindo...":"✨ Extrair com IA"}</Btn>
        </div>
      </Card>
      {list.length>0&&(
        <Card n="2" title={`${list.length} Leads Encontrados`}>
          <div style={{display:"flex",flexDirection:"column",gap:7,maxHeight:260,overflowY:"auto",marginBottom:12}}>
            {list.map((lead,idx)=>(
              <div key={idx} style={{background:G.s2,border:`1px solid ${G.bd}`,borderRadius:10,padding:"9px 12px",display:"flex",alignItems:"center",gap:8}}>
                {editIdx===idx?(
                  <>
                    <input value={editRow.nome} onChange={e=>setEditRow({...editRow,nome:e.target.value})} style={{flex:2,background:G.bg,border:`1px solid ${G.green}`,borderRadius:7,color:G.text,fontSize:13,padding:"5px 9px",outline:"none"}}/>
                    <input value={editRow.telefone} onChange={e=>setEditRow({...editRow,telefone:e.target.value})} style={{flex:1,background:G.bg,border:`1px solid ${G.green}`,borderRadius:7,color:G.text,fontSize:13,padding:"5px 9px",outline:"none",marginLeft:6}}/>
                    <button onClick={()=>{setList(p=>p.map((r,i)=>i===editIdx?editRow:r));setEditIdx(null);}} style={{background:G.gdim,border:`1px solid ${G.green}`,color:G.green,borderRadius:7,padding:"4px 10px",cursor:"pointer",fontSize:12,fontFamily:"inherit",marginLeft:6}}>✓</button>
                  </>
                ):(
                  <>
                    <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{lead.nome}</div><div style={{fontSize:11,color:lead.telefone==="sem telefone"?G.danger:G.muted,marginTop:2}}>{lead.telefone}</div></div>
                    <button onClick={()=>{setEditIdx(idx);setEditRow(lead);}} style={{background:"none",border:`1px solid ${G.bd}`,color:G.muted,borderRadius:7,padding:"3px 8px",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>✏️</button>
                    <button onClick={()=>setList(p=>p.filter((_,i)=>i!==idx))} style={{background:"none",border:"1px solid #ff4d6d40",color:G.danger,borderRadius:7,padding:"3px 8px",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>✕</button>
                  </>
                )}
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn v="ghost" onClick={()=>dlCSV(list,"leads")} style={{flex:1}}>⬇ Baixar CSV</Btn>
            <Btn v="green" onClick={enviar} style={{flex:2}}>✅ Usar no Disparador →</Btn>
          </div>
        </Card>
      )}
      {globalLeads.length>0&&(
        <Card>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:13,color:G.muted}}>📋 <strong style={{color:G.green}}>{globalLeads.length} leads</strong> na lista</span>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>dlCSV(globalLeads,"leads")} style={{background:G.s2,border:`1px solid ${G.bd}`,color:G.text,borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>⬇ CSV</button>
              <button onClick={()=>{if(window.confirm("Limpar?"))setGlobalLeads([]);}} style={{background:"none",border:"1px solid #ff4d6d40",color:G.danger,borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>🗑</button>
            </div>
          </div>
        </Card>
      )}
    </div>
  );
}

function Disparador({user,globalLeads,setGlobalLeads}){
  const[bizName,setBizName]=useState("");
  const[bizSeg,setBizSeg]=useState("");
  const[bizDesc,setBizDesc]=useState("");
  const[selT,setSelT]=useState("");
  const[custT,setCustT]=useState("");
  const[msg,setMsg]=useState("");
  const[gen,setGen]=useState(false);
  const[qty,setQty]=useState(30);
  const[pause,setPause]=useState(60);
  const[csvLeads,setCsvLeads]=useState([]);
  const[csvInfo,setCsvInfo]=useState("");
  const[running,setRunning]=useState(false);
  const[sent,setSent]=useState(0);
  const[logs,setLogs]=useState([]);
  const stopRef=useRef(false);
  const logRef=useRef(null);
  const all=[...globalLeads,...csvLeads];
  const addLog=(text,type="info")=>{const t=new Date().toLocaleTimeString("pt-BR");setLogs(p=>[...p,{text,type,t}]);setTimeout(()=>logRef.current&&(logRef.current.scrollTop=logRef.current.scrollHeight),50);};
  const gerar=async()=>{
    if(!bizName){alert("Preencha o nome do negócio.");return;}
    setGen(true);
    const target=selT||custT||"profissionais em geral";
    const prompt=`Crie uma mensagem de prospecção para WhatsApp com no máximo 200 palavras.\nNegócio: ${bizName} | Segmento: ${bizSeg||"não informado"} | Descrição: ${bizDesc||"não informado"} | Público: ${target}\nRequisitos: saudação amigável, apresentação breve, benefício principal, CTA claro, emojis moderados, português brasileiro natural.\nRetorne APENAS a mensagem, sem explicações.`;
    try{setMsg(await callClaude(prompt));}catch(e){alert("Erro: "+e.message);}
    setGen(false);
  };
  const loadCSV=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const lines=ev.target.result.trim().split("\n");
      const header=lines[0].split(",").map(h=>h.trim().replace(/"/g,""));
      const rows=lines.slice(1).map(line=>{const vals=line.split(",").map(v=>v.trim().replace(/"/g,""));const obj={};header.forEach((h,i)=>obj[h]=vals[i]||"");return obj;}).filter(r=>Object.values(r).some(v=>v));
      setCsvLeads(rows);setCsvInfo(`✅ ${rows.length} leads carregados.`);
    };
    reader.readAsText(file,"UTF-8");
  };
  const saveCampaign=async(sentCount)=>{
    try{const camps=DB.get(`automsg_camps_${user.email}`)||[];camps.push({date:new Date().toISOString(),bizName,message:msg,target:selT||custT||"Geral",sent:sentCount,totalLeads:all.length,pause,qty});DB.set(`automsg_camps_${user.email}`,camps);}catch(e){}
  };
  const iniciar=async()=>{
    if(!msg){alert("Escreva ou gere uma mensagem.");return;}
    if(!all.length){alert("Adicione leads pelo Coletor ou carregue um CSV.");return;}
    setRunning(true);stopRef.current=false;setSent(0);setLogs([]);
    addLog(`Campanha iniciada! ${all.length} leads disponíveis.`);
    const pk=phoneKey(all[0]);let s=0;
    for(let i=0;i<all.length&&s<qty&&!stopRef.current;i++){
      const phone=fmtPhone(all[i][pk]||all[i].telefone||"");
      if(phone.length<12){addLog(`Número inválido: ${phone} — pulando.`,"err");continue;}
      addLog(`Enviando para ${phone}...`);
      window.open(`https://web.whatsapp.com/send?phone=${phone}&text=${encodeURIComponent(msg)}`,"_blank");
      s++;setSent(s);addLog(`✅ WhatsApp aberto (${s}/${qty})`,"ok");
      if(s<qty&&i<all.length-1&&!stopRef.current){addLog(`⏳ Aguardando ${pause}s...`);await sleep(pause*1000);}
    }
    addLog(stopRef.current?`🛑 Parado.`:`🏁 Concluído! ${s} mensagens.`,stopRef.current?"err":"ok");
    await saveCampaign(s);setRunning(false);
  };
  const lc={ok:G.green,err:G.danger,info:G.warn};
  return(
    <div>
      <Card n="1" title="Seu Negócio">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          <div><Lbl>Nome</Lbl><input placeholder="Ex: Club Nails Brasil" value={bizName} onChange={e=>setBizName(e.target.value)} style={inp()}/></div>
          <div><Lbl>Segmento</Lbl><input placeholder="Ex: Beleza..." value={bizSeg} onChange={e=>setBizSeg(e.target.value)} style={inp()}/></div>
        </div>
        <Lbl>Descrição</Lbl>
        <textarea rows={2} placeholder="O que você oferece..." value={bizDesc} onChange={e=>setBizDesc(e.target.value)} style={inp()}/>
      </Card>
      <Card n="2" title="Público Alvo">
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
          {TARGETS.map(t=>(<span key={t.v} onClick={()=>{setSelT(t.v);setCustT("");}} style={{padding:"6px 12px",borderRadius:100,border:`1px solid ${selT===t.v?G.green:G.bd}`,background:selT===t.v?G.gdim:G.s2,color:selT===t.v?G.green:G.muted,fontSize:12,cursor:"pointer"}}>{t.e} {t.l}</span>))}
        </div>
        <input placeholder="Ou descreva seu público..." value={custT} onChange={e=>{setCustT(e.target.value);setSelT("");}} style={inp()}/>
      </Card>
      <Card n="3" title="Mensagem">
        <Btn v="purple" onClick={gerar} disabled={gen} style={{marginBottom:12}}>{gen?"⏳ Gerando...":"✨ Gerar mensagem com IA"}</Btn>
        <Lbl>Mensagem</Lbl>
        <textarea rows={6} placeholder="Escreva ou gere acima..." value={msg} onChange={e=>setMsg(e.target.value)} style={{...inp(),marginBottom:12}}/>
        <div style={{background:"#0d1117",border:"1px solid #1e2a3a",borderRadius:12,padding:14}}>
          <div style={{background:"#005c4b",borderRadius:"12px 12px 2px 12px",padding:"11px 14px",fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap",wordBreak:"break-word",maxWidth:"85%",marginLeft:"auto"}}>{msg||"Preview da mensagem..."}</div>
          <div style={{fontSize:10,color:"#8696a0",textAlign:"right",marginTop:4}}>agora ✓✓</div>
        </div>
      </Card>
      <Card n="4" title="Configurações">
        <Lbl>Mensagens por dia: <span style={{color:G.green,fontSize:16,fontWeight:800}}>{qty}</span></Lbl>
        <input type="range" min={5} max={50} value={qty} onChange={e=>setQty(+e.target.value)} style={{marginBottom:16}}/>
        <Lbl>Pausa entre mensagens: <span style={{color:G.green,fontSize:16,fontWeight:800}}>{pause}s</span></Lbl>
        <input type="range" min={30} max={180} value={pause} onChange={e=>setPause(+e.target.value)} style={{marginBottom:16}}/>
        <div style={{background:G.s2,border:`1px solid ${G.bd}`,borderRadius:12,padding:14}}>
          <div style={{fontSize:13,marginBottom:8}}>📋 Coletor: <strong style={{color:G.green}}>{globalLeads.length}</strong> &nbsp;|&nbsp; 📁 CSV: <strong style={{color:G.green}}>{csvLeads.length}</strong> &nbsp;|&nbsp; Total: <strong style={{color:G.green}}>{all.length}</strong></div>
          <Lbl>Carregar CSV</Lbl>
          <input type="file" accept=".csv" onChange={loadCSV}/>
          {csvInfo&&<div style={{fontSize:11,color:G.muted,marginTop:5}}>{csvInfo}</div>}
        </div>
      </Card>
      <Btn v="green" onClick={iniciar} disabled={running} style={{padding:18,fontSize:16,fontWeight:900,letterSpacing:"0.05em",marginTop:4}}>▶ &nbsp; Iniciar Campanha</Btn>
      {(running||logs.length>0)&&(
        <div style={{marginTop:16}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <span style={{fontSize:13,color:G.muted}}>Enviadas</span>
            <span style={{fontSize:20,fontWeight:800,color:G.green}}>{sent} / {qty}</span>
          </div>
          <div style={{height:8,background:G.bd,borderRadius:8,overflow:"hidden",marginBottom:12}}><div style={{height:"100%",background:G.green,borderRadius:8,width:`${(sent/qty)*100}%`,transition:"width 0.5s"}}/></div>
          <div ref={logRef} style={{background:"#050508",border:`1px solid ${G.bd}`,borderRadius:10,padding:12,fontFamily:"monospace",fontSize:12,height:140,overflowY:"auto",display:"flex",flexDirection:"column",gap:3}}>
            {logs.map((l,i)=>(<div key={i} style={{display:"flex",gap:8}}><span style={{color:G.muted,flexShrink:0}}>{l.t}</span><span style={{color:lc[l.type]||G.warn}}>{l.text}</span></div>))}
          </div>
          {running&&<Btn v="danger" onClick={()=>stopRef.current=true} style={{marginTop:10}}>⏹ Parar</Btn>}
        </div>
      )}
    </div>
  );
}

function App(){
  const[user,setUser]=useState(()=>DB.get("automsg_session"));
  const[tab,setTab]=useState(0);
  const[globalLeads,setGlobalLeads]=useState([]);
  const login=(u)=>{DB.set("automsg_session",u);setUser(u);};
  const logout=()=>{DB.set("automsg_session",null);setUser(null);setTab(0);setGlobalLeads([]);};
  if(!user)return <LoginScreen onLogin={login}/>;
  const TABS=["📋 Coletor","📤 Disparador","📊 Histórico"];
  return(
    <div style={{background:G.bg,minHeight:"100vh",color:G.text,fontFamily:"system-ui,sans-serif"}}>
      <div style={{maxWidth:720,margin:"0 auto",padding:"20px 14px 0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div>
            <div style={{fontSize:28,fontWeight:900,letterSpacing:"-0.03em"}}>Auto<span style={{color:G.green}}>Msg</span> <span style={{fontSize:13,color:G.muted,fontWeight:400}}>Pro</span></div>
            <div style={{fontSize:12,color:G.muted,marginTop:2}}>Olá, <strong style={{color:G.text}}>{user.name}</strong> 👋</div>
          </div>
          <button onClick={logout} style={{background:"none",border:`1px solid ${G.bd}`,color:G.muted,borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Sair</button>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:16}}>
          {TABS.map((t,i)=>(<button key={i} onClick={()=>setTab(i)} style={{flex:1,padding:"10px 0",background:tab===i?G.green:G.s1,color:tab===i?"#0a0f0a":G.muted,border:tab===i?"none":`1px solid ${G.bd}`,borderRadius:12,fontWeight:tab===i?700:400,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{t}{i===0&&globalLeads.length>0&&<span style={{marginLeft:4,background:tab===0?"#0a0f0a":G.green,color:tab===0?G.green:"#0a0f0a",borderRadius:100,fontSize:10,fontWeight:800,padding:"1px 6px"}}>{globalLeads.length}</span>}</button>))}
        </div>
      </div>
      <div style={{maxWidth:720,margin:"0 auto",padding:"0 14px 60px"}}>
        {tab===0&&<Coletor globalLeads={globalLeads} setGlobalLeads={setGlobalLeads} setTab={setTab}/>}
        {tab===1&&<Disparador user={user} globalLeads={globalLeads} setGlobalLeads={setGlobalLeads}/>}
        {tab===2&&<Historico user={user}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
